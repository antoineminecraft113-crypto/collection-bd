<style>
  :root{
    --ink:#17171A;
    --ink-soft:#83807A;
    --blue-top:#4D94FA;
    --blue-bottom:#3968E8;
    --bg:#3968E8;
    --well:#EEF1F7;
    --card:#FFFFFF;
    --line:#E7E5DE;
    --accent:#1F3A54;
    --gold:#B4872A;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  #insuranceDoc{ display:none; }
  @media print{
    html, body{ height:auto !important; overflow:visible !important; position:static !important; }
    #app, .lightbox-overlay, .sheet, .sheet-backdrop, .bg-fixed{ display:none !important; }
    body > *:not(#insuranceDoc){ display:none !important; }
    #insuranceDoc{ display:block !important; position:static; background:#fff; color:#111; padding:0; font-family:-apple-system,Helvetica,Arial,sans-serif; }
    #insuranceDoc h1{ font-size:20px; margin:0 0 4px; }
    #insuranceDoc h2{ font-size:14px; margin:22px 0 8px; border-bottom:1px solid #ccc; padding-bottom:4px; }
    #insuranceDoc .meta{ font-size:12px; color:#555; margin-bottom:16px; }
    #insuranceDoc table{ width:100%; border-collapse:collapse; font-size:11px; }
    #insuranceDoc th, #insuranceDoc td{ text-align:left; padding:4px 6px; border-bottom:1px solid #ddd; }
    #insuranceDoc tr{ page-break-inside:avoid; }
    #insuranceDoc .totals{ display:flex; gap:24px; font-size:13px; margin-bottom:10px; }
  }
  html,body{ height:100%; height:100dvh; overflow:hidden; overscroll-behavior:none; }
  body{
    margin:0;
    background:var(--blue-bottom);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .bg-fixed{ position:fixed; inset:0; z-index:-1; background:linear-gradient(180deg, var(--blue-top), var(--blue-bottom)); }
  .mono{ font-variant-numeric:tabular-nums; }
  #app{
    max-width:600px; margin:0 auto; height:100%; height:100dvh; display:flex; flex-direction:column; position:relative;
    overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain;
  }
  header.topbar{
    padding: calc(var(--safe-top) + 14px) 20px 14px;
    background:rgba(41,94,235,0.22);
    backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(255,255,255,0.14);
    border-radius:0 0 18px 18px;
    position:sticky; top:0; z-index:20;
  }
  header.topbar h1{ font-size:19px; margin:0 0 2px; font-weight:600; letter-spacing:-0.01em; color:#fff; }
  header.topbar .sub{ font-size:12.5px; color:rgba(255,255,255,0.78); }
  header.topbar.centered h1, header.topbar.centered .sub{ text-align:center; }
  main{ flex:1; padding: 18px 18px calc(90px + var(--safe-bottom)); color:rgba(255,255,255,0.92); }

  /* ---- cards & shared bits ---- */
  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; color:var(--ink); }
  .section-title{ font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); margin:26px 2px 12px; }
  #main .section-title{ color:rgba(255,255,255,0.68); }
  #main .link-btn{ color:#fff; }
  .back-btn{ background:none; border:none; color:#fff; font-size:13.5px; font-weight:600; padding:4px 2px; }
  #main .count-line{ color:rgba(255,255,255,0.72); }
  #main .empty{ color:rgba(255,255,255,0.72); }
  #main .rarity-rank{ color:rgba(255,255,255,0.6); }
  #main .field label{ color:rgba(255,255,255,0.78); }
  #main .form-msg{ color:#fff; }
  .section-title:first-child{ margin-top:0; }

  /* ---- Shelf ---- */
  .shelf-wrap{ padding:18px 14px 16px; margin-bottom:16px; }
  .shelf{ display:flex; align-items:flex-end; gap:2px; overflow-x:auto; padding: 4px 2px 6px; scrollbar-width:none; }
  .shelf::-webkit-scrollbar{ display:none; }
  .spine{
    flex:0 0 auto; height:150px; background:var(--card); border:1px solid var(--line);
    border-radius:5px 5px 2px 2px; display:flex; align-items:center; justify-content:center;
    padding:10px 0; cursor:pointer; overflow:hidden;
  }
  .spine .label{
    writing-mode:vertical-rl; text-orientation:mixed; transform:rotate(180deg);
    font-size:11px; font-weight:600; color:var(--ink); letter-spacing:0.02em;
    max-height:100%; overflow:hidden; white-space:nowrap;
  }
  .shelf-floor{ height:1px; background:var(--line); margin:0 2px 4px; }

  .mini-stats{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:8px; }
  .mini-stat{ padding:12px 8px; text-align:center; }
  .mini-stat .val{ font-size:15.5px; font-weight:700; }
  .mini-stat .lab{ font-size:9.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.05em; margin-top:3px; }

  .vitrine-card{ display:flex; align-items:center; gap:14px; padding:12px 14px; margin-bottom:10px; cursor:pointer; }
  .vitrine-thumb{
    width:60px; height:82px; border-radius:8px; background:var(--well); border:1px solid var(--line);
    flex:0 0 auto; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--ink-soft); overflow:hidden;
  }
  .vitrine-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .vitrine-thumb .ph-icon{ font-size:18px; margin-bottom:4px; }
  .vitrine-thumb .ph-hint{ font-size:8.5px; text-align:center; line-height:1.2; padding:0 4px; }
  .vitrine-main{ flex:1; min-width:0; }
  .vitrine-title{ font-size:14.5px; font-weight:700; }
  .vitrine-meta{ font-size:12px; color:var(--ink-soft); }
  .chev{ color:var(--ink-soft); font-size:16px; }
  .switch-label{ display:flex; align-items:center; gap:10px; font-size:13px; color:rgba(255,255,255,0.85); margin:0 2px 14px; cursor:pointer; }
  .reminder-banner{ display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.25); border-radius:14px; padding:11px 12px; margin-bottom:18px; }
  .reminder-icon{ font-size:15px; flex:0 0 auto; }
  .reminder-text{ flex:1; font-size:12px; color:#fff; line-height:1.35; }
  .reminder-btn{ flex:0 0 auto; background:#fff; color:var(--accent); border:none; border-radius:8px; padding:7px 11px; font-size:12px; font-weight:700; }
  .reminder-dismiss{ flex:0 0 auto; background:none; border:none; color:rgba(255,255,255,0.7); font-size:16px; padding:2px 4px; }
  .switch-label input{ display:none; }
  .switch-track{ position:relative; width:44px; height:26px; border-radius:999px; background:rgba(255,255,255,0.3); flex:0 0 auto; transition:background 0.2s; }

/* ================================================================
   PERSISTANCE — stockage local à cet appareil / cette install Safari
   (tant que l'appli n'est pas hébergée sur un vrai serveur)

   Les BD ajoutées (texte, petit volume) restent dans localStorage.
   Les photos (volumineuses) sont stockées dans IndexedDB, qui accepte
   bien plus de données que localStorage (limité à ~5 Mo) — nécessaire
   pour tenir plusieurs centaines de photos compressées.
   ================================================================ */
const LS_ADDED = "bdcollection_ajouts_v1";
function loadAdded(){
  try{
    const raw = JSON.parse(localStorage.getItem(LS_ADDED) || "[]");
    return raw.map(normalizeRow); // convertit automatiquement d'anciens formats si besoin
  }catch(e){ return []; }
}
function saveAdded(list){ try{ localStorage.setItem(LS_ADDED, JSON.stringify(list)); }catch(e){} }
let userAdded = loadAdded();       // BD ajoutées via l'onglet "Ajouter", toujours normalisées en objets nommés

const LS_DELETED = "bdcollection_deleted_v1";
function loadDeleted(){ try{ return new Set(JSON.parse(localStorage.getItem(LS_DELETED) || "[]")); }catch(e){ return new Set(); } }
function saveDeleted(){ try{ localStorage.setItem(LS_DELETED, JSON.stringify([...deletedNums])); }catch(e){} }
let deletedNums = loadDeleted();   // nums des BD de base supprimées ou remplacées par une modification

const LS_DELETED_AT = "bdcollection_deleted_at_v1";
function loadDeletedAt(){ try{ return JSON.parse(localStorage.getItem(LS_DELETED_AT) || "{}"); }catch(e){ return {}; } }
function saveDeletedAt(){ try{ localStorage.setItem(LS_DELETED_AT, JSON.stringify(deletedAt)); }catch(e){} }
let deletedAt = loadDeletedAt();   // { num: "date ISO de suppression" }

/* ================================================================
   PARA-BD — objets dérivés (fèves, figurines, etc.), indépendants des BD
   ================================================================ */
// Absorbe l'ancien format (objet = catégorie, pas de champ dédié ; "date" au lieu d'"année")
function normalizeParaItem(p){
  return {
    id: p.id,
    serie: p.serie,
    categorie: p.categorie ?? p.objet ?? "Non renseigné",
    objet: p.categorie ? (p.objet ?? null) : null,
    collection: p.collection ?? null,
    annee: p.annee ?? p.date ?? null,
    etat: p.etat ?? null,
    editeur: p.editeur ?? null,
    cout: p.cout ?? null,
    commentaire: p.commentaire ?? "",
    deletedAt: p.deletedAt ?? undefined,
    modifiedAt: p.modifiedAt ?? undefined
  };
}
const LS_PARABD = "bdcollection_parabd_v1";
function loadParabd(){ try{ return (JSON.parse(localStorage.getItem(LS_PARABD)) || []).map(normalizeParaItem); }catch(e){ return []; } }
function saveParabd(){ try{ localStorage.setItem(LS_PARABD, JSON.stringify(parabdItems)); }catch(e){} }
let parabdItems = loadParabd();    // { id, serie, categorie, objet, annee, etat, editeur, cout, commentaire }
function nextParaId(){ return Date.now(); }

const LS_PARABD_TRASH = "bdcollection_parabd_trash_v1";
function loadParabdTrash(){ try{ return (JSON.parse(localStorage.getItem(LS_PARABD_TRASH)) || []).map(normalizeParaItem); }catch(e){ return []; } }
function saveParabdTrash(){ try{ localStorage.setItem(LS_PARABD_TRASH, JSON.stringify(parabdTrash)); }catch(e){} }
let parabdTrash = loadParabdTrash();

function deleteParaItem(id){
  const idx = parabdItems.findIndex(p=>p.id===id);
  if(idx>=0){
    parabdTrash.push({ ...parabdItems[idx], deletedAt: new Date().toISOString() });
    parabdItems.splice(idx,1);
    saveParabd();
    saveParabdTrash();
  }
}
function restoreParaItem(id){
  const idx = parabdTrash.findIndex(p=>p.id===id);
  if(idx>=0){
    const { deletedAt, ...item } = parabdTrash[idx];
    parabdItems.push(item);
    parabdTrash.splice(idx,1);
    saveParabd();
    saveParabdTrash();
  }
}
async function purgeParaItem(id){
  const idx = parabdTrash.findIndex(p=>p.id===id);
  if(idx>=0){
    parabdTrash.splice(idx,1);
    saveParabdTrash();
  }
  const key = "para"+id;
  if(PHOTOS[key]){ PHOTOS[key] = []; await idbSavePhotosFor(key); }
}
function editParaItem(id, fields){
  const idx = parabdItems.findIndex(p=>p.id===id);
  if(idx>=0) parabdItems[idx] = { ...fields, id, modifiedAt: new Date().toISOString() };
  saveParabd();
}

// --- IndexedDB : une seule table clé/valeur (clé = "ex<num>", valeur = tableau de dataURL) ---
const IDB_NAME = "bdcollection_db";
const IDB_STORE = "photos";
let idbPromise = null;
function openIDB(){
  if(idbPromise) return idbPromise;
  idbPromise = new Promise((resolve, reject)=>{
    if(!window.indexedDB){ reject(new Error("IndexedDB indisponible")); return; }
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
  return idbPromise;
}
async function idbLoadAllPhotos(){
  try{
    const db = await openIDB();
    return await new Promise((resolve, reject)=>{
      const store = db.transaction(IDB_STORE, "readonly").objectStore(IDB_STORE);
      const out = {};
      const cursorReq = store.openCursor();
      cursorReq.onsuccess = e=>{
        const cur = e.target.result;
        if(cur){ out[cur.key] = cur.value; cur.continue(); }
        else resolve(out);
      };
      cursorReq.onerror = ()=> reject(cursorReq.error);
    });
  }catch(e){ return {}; }
}
async function idbSavePhotosFor(key){
  try{
    const db = await openIDB();
    await new Promise((resolve, reject)=>{
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put(PHOTOS[key] || [], key);
      tx.oncomplete = resolve;
      tx.onerror = ()=> reject(tx.error);
    });
  }catch(e){ /* silencieux : le stockage restera en mémoire pour cette session */ }
}

// --- Jauge d'espace de stockage (photos) ---
function currentPhotoCount(){ return Object.values(PHOTOS).reduce((s,arr)=>s+arr.length,0); }
function currentPhotoBytesEstimate(){
  let total = 0;
  Object.values(PHOTOS).forEach(arr=> arr.forEach(src=>{ total += Math.round(src.length*0.75); }));
  return total;
}
async function updateStorageGauge(){
  const el = document.getElementById("storageGauge");
  if(!el) return;
  let usage = 0, quota = 0, estimateAvailable = false;
  if(navigator.storage && navigator.storage.estimate){
    try{ const est = await navigator.storage.estimate(); usage = est.usage||0; quota = est.quota||0; estimateAvailable = quota>0; }catch(e){}
  }
  const photoCount = currentPhotoCount();
  const photoBytes = currentPhotoBytesEstimate();
  const avgPhotoBytes = photoCount>0 ? photoBytes/photoCount : 170*1024; // hypothèse ~170 Ko tant qu'aucune photo n'existe
  const fmtMo = b => (b/1048576).toFixed(0);
  if(!estimateAvailable){
    el.innerHTML = `<p style="margin:0;">${photoCount} photo${photoCount>1?"s":""} stockée${photoCount>1?"s":""} (~${fmtMo(photoBytes)} Mo). Estimation de l'espace disponible non fournie par ce navigateur.</p>`;
    return;
  }
  const pct = Math.min(100, (usage/quota)*100);
  const remainingPhotos = Math.max(0, Math.floor((quota-usage)/avgPhotoBytes));
  el.innerHTML = `
    <div class="bar-label"><span>${fmtMo(usage)} Mo utilisés</span><span class="mono">${fmtMo(quota)} Mo disponibles sur l'appareil</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%"></div></div>
    <p style="margin:8px 0 0;">${photoCount} photo${photoCount>1?"s":""} stockée${photoCount>1?"s":""} · encore environ <strong>${remainingPhotos.toLocaleString("fr-FR")}</strong> photos possibles à ce rythme.</p>
  `;
}
// --- Compression d'image (avant stockage) : redimensionne + réencode en JPEG ---
function compressImage(file, maxDim=1100, quality=0.72){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let { width, height } = img;
        if(width > height && width > maxDim){ height = Math.round(height * maxDim/width); width = maxDim; }
        else if(height >= width && height > maxDim){ width = Math.round(width * maxDim/height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ================================================================
   COMPATIBILITÉ — garantit que les sauvegardes exportées restent
   importables même si le code évolue plus tard (nouvel onglet, nouveau
   champ, etc.). Deux règles :
   1. normalizeRow() accepte aussi bien une ligne RAW (tableau positionnel,
      utilisé uniquement pour les 150 BD de base codées en dur) qu'un objet
      nommé (BD ajoutée par l'utilisateur ou réimportée) — un champ manquant
      prend une valeur par défaut au lieu de décaler les autres champs.
   2. Les BD ajoutées par l'utilisateur reçoivent un identifiant "num" dans
      une plage réservée (100000+), totalement séparée de celle des BD de
      base (1-999). Même si la liste de base grandit dans le futur, aucune
      collision n'est possible avec une BD déjà ajoutée par l'utilisateur.
   ================================================================ */
const SCHEMA_VERSION = 1;
const APP_VERSION = "1.2.8"; // format X.Y.Z : Z +1 à chaque mise à jour ; à Z=20, Y +1 et Z revient à 0 (ex. 1.2.20 → 1.3.0)
const APP_VERSION_DATE = "19/07/2026"; // date de cette version, au format JJ/MM/AAAA — à mettre à jour à chaque changement
const USER_ID_BASE = 100000;
function normalizeRow(r){
  if(Array.isArray(r)){
    const [num, serie, titre, tome, format, eo, annee, editeur, etat, cout, vente, cote, commentaire, owned] = r;
    return { num, serie, titre, tome, format, eo:!!eo, annee, editeur, etat, cout, vente, cote, commentaire, owned, modifiedAt:null };
  }
  return {
    num: r.num,
    serie: r.serie, titre: r.titre,
    tome: r.tome ?? "Unique", format: r.format ?? "Classique",
    eo: !!r.eo, annee: r.annee ?? null, editeur: r.editeur ?? null, etat: r.etat ?? null,
    cout: r.cout ?? null, vente: r.vente ?? null, cote: r.cote ?? "Non coté",
    commentaire: r.commentaire ?? "", owned: r.owned !== false, modifiedAt: r.modifiedAt ?? null
  };
}
function nextUserNum(){
  const existing = userAdded.map(r=>r.num).filter(n=>n>=USER_ID_BASE);
  return existing.length ? Math.max(...existing)+1 : USER_ID_BASE;
}

/* ================================================================
   MODÈLE — regroupe les lignes en albums (fusion automatique des doublons)
   ================================================================ */
function buildAlbums(rawRows, userRows){
  const map = new Map();
  const order = [];
  let aid = 0;
  function processRow(row, isRaw){
    const { num, serie, titre, tome, format, eo, annee, editeur, etat, cout, vente, cote, commentaire, owned, modifiedAt } = row;
    if(isRaw && deletedNums.has(num)) return; // BD de base supprimée ou remplacée par une version modifiée
    const key = [serie,titre,tome,format].join("|||");
    if(!map.has(key)){
      map.set(key, { aid: aid++, serie, titre, tome, format, owned:false, exemplaires: [] });
      order.push(key);
    }
    const album = map.get(key);
    if(owned){
      album.owned = true;
      album.exemplaires.push({ key:"ex"+num, num, eo, annee, editeur, etat, cout, vente, cote, commentaire, modifiedAt });
    }
  }
  rawRows.map(normalizeRow).forEach(row=>processRow(row, true));
  userRows.map(normalizeRow).forEach(row=>processRow(row, false));
  return order.map(k=>map.get(k));
}

let ALBUMS = [], OWNED = [], SERIES = [], SERIE_COUNTS = [];
function refreshDerived(){
  ALBUMS = buildAlbums(RAW, userAdded);
  OWNED = ALBUMS.filter(a=>a.owned);
  SERIES = [...new Set(OWNED.map(a=>a.serie))];
  SERIE_COUNTS = SERIES.map(s=>({
    serie:s,
    count: OWNED.filter(a=>a.serie===s).reduce((sum,a)=>sum+a.exemplaires.length,0)
  })).sort((a,b)=>b.count-a.count);
}

function deleteExemplaire(num){
  // capture un instantané complet (album + exemplaire) avant suppression, qu'il vienne de la base ou d'un ajout
  const album = ALBUMS.find(a=>a.exemplaires.some(e=>e.num===num));
  const ex = album && album.exemplaires.find(e=>e.num===num);
  if(album && ex){
    bdTrash.push({
      num, serie:album.serie, titre:album.titre, tome:album.tome, format:album.format,
      eo:ex.eo, annee:ex.annee, editeur:ex.editeur, etat:ex.etat, cout:ex.cout, vente:ex.vente, cote:ex.cote, commentaire:ex.commentaire,
      deletedAt: new Date().toISOString()
    });
    saveBdTrash();
  }
  userAdded = userAdded.filter(r=>r.num!==num);
  if(num < USER_ID_BASE){
    deletedNums.add(num);
    saveDeleted();
  }
  saveAdded(userAdded);
  refreshDerived();
}
function trashedRows(){
  return bdTrash.slice();
}
function restoreDeleted(num){
  const idx = bdTrash.findIndex(r=>r.num===num);
  const snapshot = idx>=0 ? bdTrash[idx] : null;
  if(idx>=0){ bdTrash.splice(idx,1); saveBdTrash(); }
  if(num < USER_ID_BASE){
    // BD de base : on retire juste le masquage, l'original réapparaît tel quel depuis RAW
    deletedNums.delete(num);
    saveDeleted();
    userAdded = userAdded.filter(r=>r.num!==num); // enlève une éventuelle version modifiée, pour retrouver l'originale telle quelle
  } else if(snapshot){
    // BD ajoutée par l'utilisateur : elle n'existe nulle part ailleurs, on la recrée depuis l'instantané
    userAdded.push({
      num, serie:snapshot.serie, titre:snapshot.titre, tome:snapshot.tome, format:snapshot.format,
      eo:snapshot.eo, annee:snapshot.annee, editeur:snapshot.editeur, etat:snapshot.etat,
      cout:snapshot.cout, vente:snapshot.vente, cote:snapshot.cote, commentaire:snapshot.commentaire, owned:true
    });
  }
  saveAdded(userAdded);
  refreshDerived();
}
async function purgeBdTrash(num){
  const idx = bdTrash.findIndex(r=>r.num===num);
  if(idx>=0){ bdTrash.splice(idx,1); saveBdTrash(); }
  const key = "ex"+num;
  if(PHOTOS[key]){ PHOTOS[key] = []; await idbSavePhotosFor(key); }
  // Pour une BD de base, le masquage (deletedNums) reste : elle continue de ne pas apparaître dans la collection.
  // Pour une BD ajoutée, elle n'existait déjà plus ailleurs : la sortir de la corbeille suffit à l'effacer pour de bon.
}
function editExemplaire(num, fields){
  const withTimestamp = { ...fields, modifiedAt: new Date().toISOString() };
  if(num >= USER_ID_BASE){
    const idx = userAdded.findIndex(r=>r.num===num);
    if(idx>=0) userAdded[idx] = { ...withTimestamp, num, owned:true };
  } else {
    deletedNums.add(num); saveDeleted();
    userAdded = userAdded.filter(r=>r.num!==num);
    userAdded.push({ ...withTimestamp, num, owned:true });
  }
  saveAdded(userAdded);
  refreshDerived();
}

// --- Visionneuse plein écran des photos, avec balayage pour passer d'une photo à l'autre ---
let lightboxPhotos = [];
let lightboxIndex = 0;
function openLightbox(photos, startIndex){
  lightboxPhotos = photos;
  lightboxIndex = startIndex;
  renderLightbox();
}
function touchDist(touches){
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.hypot(dx, dy);
}
function renderLightbox(){
  const overlay = document.getElementById("lightboxOverlay");
  const dots = lightboxPhotos.length>1
    ? `<div class="lightbox-dots">${lightboxPhotos.map((_,i)=>`<span class="lightbox-dot ${i===lightboxIndex?'active':''}"></span>`).join("")}</div>`
    : "";
  overlay.innerHTML = `
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    ${lightboxPhotos.length>1 ? `<div class="lightbox-counter">${lightboxIndex+1} / ${lightboxPhotos.length}</div>` : ""}
    <img class="lightbox-img" id="lightboxImg" src="${lightboxPhotos[lightboxIndex]}">
    ${dots}
  `;
  overlay.classList.add("open");
  document.getElementById("lightboxClose").addEventListener("click", closeLightbox);

  const img = document.getElementById("lightboxImg");
  let scale = 1, tx = 0, ty = 0;
  let pinchStartDist = null, pinchStartScale = 1;
  let panStart = null, panStartTX = 0, panStartTY = 0;
  let swipeStartX = null;
  let lastTapAt = 0;

  function applyTransform(withTransition){
    img.style.transition = withTransition ? "transform 0.2s ease" : "none";
    img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  }

  overlay.ontouchstart = e=>{
    if(e.touches.length===2){
      pinchStartDist = touchDist(e.touches);
      pinchStartScale = scale;
      swipeStartX = null;
    } else if(e.touches.length===1){
      const now = Date.now();
      if(now - lastTapAt < 300){
        // double-tap : bascule zoom avant/arrière
        scale = scale>1 ? 1 : 2.5;
        tx = 0; ty = 0;
        applyTransform(true);
      }
      lastTapAt = now;
      if(scale>1){
        panStart = { x:e.touches[0].clientX, y:e.touches[0].clientY };
        panStartTX = tx; panStartTY = ty;
      } else {
        swipeStartX = e.touches[0].clientX;
      }
    }
  };
  overlay.ontouchmove = e=>{
    if(e.touches.length===2 && pinchStartDist){
      e.preventDefault();
      const dist = touchDist(e.touches);
      scale = Math.min(4, Math.max(1, pinchStartScale * (dist/pinchStartDist)));
      applyTransform(false);
    } else if(e.touches.length===1 && scale>1 && panStart){
      e.preventDefault();
      tx = panStartTX + (e.touches[0].clientX - panStart.x);
      ty = panStartTY + (e.touches[0].clientY - panStart.y);
      applyTransform(false);
    }
  };
  overlay.ontouchend = e=>{
    pinchStartDist = null;
    panStart = null;
    if(scale<=1 && swipeStartX!==null && e.changedTouches.length){
      const diff = e.changedTouches[0].clientX - swipeStartX;
      if(Math.abs(diff) > 40){
        if(diff < 0 && lightboxIndex < lightboxPhotos.length-1){ lightboxIndex++; renderLightbox(); }
        else if(diff > 0 && lightboxIndex > 0){ lightboxIndex--; renderLightbox(); }
      }
    }
    swipeStartX = null;
  };
}
function closeLightbox(){
  document.getElementById("lightboxOverlay").classList.remove("open");
}

// --- Recherche insensible aux accents/majuscules (utilisée par les suggestions du formulaire "Ajouter") ---
function normalizeText(s){ return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/['’‘´`]/g,"").toLowerCase().trim(); }

// --- Distance de Levenshtein (nombre minimal de modifications pour passer d'une chaîne à l'autre) ---
function levenshtein(a, b){
  const m = a.length, n = b.length;
  if(m===0) return n;
  if(n===0) return m;
  const d = Array.from({length:m+1}, (_,i)=>[i, ...Array(n).fill(0)]);
  for(let j=0;j<=n;j++) d[0][j] = j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      d[i][j] = a[i-1]===b[j-1] ? d[i-1][j-1] : 1 + Math.min(d[i-1][j], d[i][j-1], d[i-1][j-1]);
    }
  }
  return d[m][n];
}
// Cherche une catégorie déjà existante (pour cette série) proche de celle tapée.
// Retourne {match, exact:true} pour une correspondance accents/majuscules près, {match, exact:false} pour une orthographe proche (faute de frappe probable), ou null si rien de proche.
function findSimilarIn(existing, typed){
  const normTyped = normalizeText(typed);
  const exact = existing.find(c=>normalizeText(c)===normTyped);
  if(exact) return { match:exact, exact:true };
  let best = null, bestDist = Infinity;
  existing.forEach(c=>{
    const d = levenshtein(normTyped, normalizeText(c));
    if(d < bestDist){ bestDist = d; best = c; }
  });
  if(!best) return null;
  const threshold = Math.max(1, Math.floor(Math.max(normTyped.length, normalizeText(best).length) * 0.3));
  if(bestDist>0 && bestDist<=threshold) return { match:best, exact:false };
  return null;
}
function findSimilarCategory(serie, typed){
  const existing = distinctValues(paraItemsFor(serie).map(p=>p.categorie));
  return findSimilarIn(existing, typed);
}
function findSimilarCollection(serie, categorie, typed){
  const existing = distinctValues(parabdItems.filter(p=>p.serie===serie && p.categorie===categorie).map(p=>p.collection));
  return findSimilarIn(existing, typed);
}
function distinctValues(list){ return [...new Set(list.filter(Boolean))].sort((a,b)=>a.localeCompare(b,"fr")); }
function distinctSeries(){ return distinctValues(OWNED.map(a=>a.serie)); }
function distinctTitres(){ return distinctValues(OWNED.map(a=>a.titre)); }
function distinctFormats(){ return distinctValues(OWNED.map(a=>a.format)); }
// Regroupe les variantes d'un même format (ex. "Classique - 14b", "Classique - 1C" → "Classique") pour ne pas les lister séparément.
function formatBase(format){ return (format||"").split(" - ")[0].trim(); }
function distinctFormatBases(serie){
  const source = serie ? OWNED.filter(a=>a.serie===serie) : OWNED;
  return [...new Set(source.map(a=>formatBase(a.format)))].sort((a,b)=>a.localeCompare(b,"fr"));
}
function distinctEditeurs(){ return distinctValues(OWNED.flatMap(a=>a.exemplaires.map(e=>e.editeur))); }

// --- Helpers Para-BD ---
function distinctParaSeries(){ return distinctValues(parabdItems.map(p=>p.serie)).sort((a,b)=>a.localeCompare(b,"fr")); }
function paraItemsFor(serie){ return parabdItems.filter(p=>p.serie===serie); }
function distinctParaCategories(serie){ return distinctValues(paraItemsFor(serie).map(p=>p.categorie)).sort((a,b)=>a.localeCompare(b,"fr")); }
function paraItemsForCategorie(serie,categorie){ return parabdItems.filter(p=>p.serie===serie && p.categorie===categorie); }
function distinctParaEditeurs(){ return distinctValues(parabdItems.map(p=>p.editeur)); }

// Attache une suggestion accent-insensible à un champ texte, sans passer par un re-rendu complet (le focus/curseur ne bougent pas)
function attachCombo(inputId, listId, getOptions){
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);
  if(!input || !list) return;
  function refresh(){
    const q = normalizeText(input.value);
    if(!q){ list.innerHTML=""; return; }
    const matches = getOptions().filter(o=>normalizeText(o).includes(q)).slice(0,6);
    list.innerHTML = matches.map(o=>`<div class="combo-item" data-value="${o.replace(/"/g,'&quot;')}">${o}</div>`).join("");
    list.querySelectorAll(".combo-item").forEach(el=>{
      el.addEventListener("mousedown", ev=>{
        ev.preventDefault(); // se déclenche avant le blur de l'input, pour ne pas fermer la liste trop tôt
        input.value = el.dataset.value;
        list.innerHTML = "";
      });
    });
  }
  input.addEventListener("input", refresh);
  input.addEventListener("focus", refresh);
  input.addEventListener("blur", ()=> setTimeout(()=>{ list.innerHTML=""; }, 150));
}

function renderCollection(){
  let list = OWNED.slice();
  if(state.filterSerie) list = list.filter(a=>a.serie===state.filterSerie);
  if(state.filterFormat) list = list.filter(a=>formatBase(a.format)===state.filterFormat);
  if(state.filterEtat) list = list.filter(a=>a.exemplaires.some(e=>e.etat===state.filterEtat));
  if(state.query){
    const q = normalizeText(state.query);
    list = list.filter(a=>{
      const inEditeurs = a.exemplaires.some(e=>normalizeText(e.editeur||"").includes(q));
      return normalizeText(a.titre).includes(q) || normalizeText(a.serie).includes(q) || inEditeurs;
    });
  }
  if(state.sort==="num") list.sort((a,b)=>a.exemplaires[0].num-b.exemplaires[0].num);
  if(state.sort==="alpha") list.sort((a,b)=>a.titre.localeCompare(b.titre));
  if(state.sort==="vente") list.sort((a,b)=>albumTotalVente(b)-albumTotalVente(a));
  if(state.sort==="cote") list.sort((a,b)=>Math.max(...b.exemplaires.map(e=>parseCote(e.cote)||0)) - Math.max(...a.exemplaires.map(e=>parseCote(e.cote)||0)));
  if(state.sort==="eo") list.sort((a,b)=>(albumHasEO(b)?1:0)-(albumHasEO(a)?1:0) || a.exemplaires[0].num-b.exemplaires[0].num);
  if(state.sort==="tome") list.sort((a,b)=>{
    const ta = parseInt(a.tome,10), tb = parseInt(b.tome,10);
    const aNum = !isNaN(ta), bNum = !isNaN(tb);
    if(aNum && bNum) return ta-tb;
    if(aNum) return -1;
    if(bNum) return 1;
    return a.titre.localeCompare(b.titre,"fr");
  });
  if(state.sort==="parution") list.sort((a,b)=>{
    const yearOf = al => { const y = parseInt((al.exemplaires[0].annee||"").toString(),10); return isNaN(y) ? null : y; };
    const ya = yearOf(a), yb = yearOf(b);
    if(ya!==null && yb!==null) return ya-yb;
    if(ya!==null) return -1;
    if(yb!==null) return 1;
    return a.titre.localeCompare(b.titre,"fr");
  });

  const chips = ["Toutes", ...SERIE_COUNTS.map(s=>s.serie)].map(s=>{
    const active = (s==="Toutes" && !state.filterSerie) || s===state.filterSerie;
    return `<div class="chip ${active?'active':''}" data-chip="${s==='Toutes'?'':s}">${s}</div>`;
  }).join("");

  const rows = list.map(a=>{
    const multi = a.exemplaires.length>1;
    const ex = a.exemplaires[0];
    const yr = sameAnnee(a);
    const hasEO = multi ? albumHasEO(a) : ex.eo;
    const sub = multi
      ? `${a.serie} · T${a.tome} · ${yr?yr+" · ":""}${multiLabel(a.exemplaires.length)}`
      : `${a.serie} · T${a.tome} · ${ex.editeur||"Non renseigné"} · ${ex.annee||"Non renseigné"}`;
    const badge = `${hasEO?'<span class="badge eo-badge">EO</span> ':''}<span class="badge" style="background:${etatColor(ex.etat)}; color:${etatTextColor(ex.etat)};">${ex.etat||"Non renseigné"}</span>`;
    const valueDisplay = multi
      ? eur(albumTotalVente(a))
      : (!isNonCote(ex.cote) ? coteDisplay(ex.cote) : eur(ex.vente));
    return `
      <div class="card album-row" data-detail="${a.aid}">
        <div class="album-num mono">${ex.num < USER_ID_BASE ? ex.num : "＋"}</div>
        <div class="album-main">
          <div class="album-title">${a.titre}</div>
          <div class="album-sub">${sub}</div>
        </div>
        <div class="album-right">
          ${badge}
          <div class="val-line mono">${valueDisplay}</div>
        </div>
      </div>
    `;
  }).join("") || `<div class="empty">Aucun album ne correspond à ta recherche.</div>`;

  const sortOptions = {num:"Numéro", alpha:"Alphabétique", vente:"Valeur", cote:"Côte", eo:"EO d'abord", tome:"Tome", parution:"Ordre de parution"};
  const sortOpts = Object.keys(sortOptions).map(k=>`<option value="${k}" ${state.sort===k?"selected":""}>${sortOptions[k]}</option>`).join("");
  const formatOpts = distinctFormatBases(state.filterSerie).map(f=>`<option value="${f}" ${state.filterFormat===f?"selected":""}>${f}</option>`).join("");
  const etatOpts = ETAT_OPTIONS.map(e=>`<option value="${e}" ${state.filterEtat===e?"selected":""}>${e}</option>`).join("");

  return `
    <div class="search-wrap">
      <input class="search-input" id="searchBox" placeholder="Chercher un titre, une série, un éditeur…" value="${state.query}">
      ${state.query ? `<button class="clear-search" id="clearSearch" aria-label="Effacer">×</button>` : ""}
    </div>
    <div class="chip-row">${chips}</div>
    <div class="count-line">${list.length} album${list.length>1?'s':''}</div>
    <div class="row-between" style="gap:8px; margin-bottom:8px;">
      <select class="sort-select" id="formatFilterSelect" style="flex:1; min-width:0;">
        <option value="">Tous les formats</option>
        ${formatOpts}
      </select>
      <select class="sort-select" id="etatFilterSelect" style="flex:1; min-width:0;">
        <option value="">Tous les états</option>
        ${etatOpts}
      </select>
    </div>
    <div style="margin-bottom:14px;">
      <select class="sort-select" id="sortSelect" style="width:100%;">${sortOpts}</select>
    </div>
    ${rows}
  `;
}

async function exportBackup(){
  const payload = {
    schemaVersion: SCHEMA_VERSION, exportedAt: new Date().toISOString(),
    added: userAdded, deleted: [...deletedNums], bdTrash: bdTrash, parabd: parabdItems, parabdTrash: parabdTrash, photos: PHOTOS
  };
  const now = new Date();
  const dd = String(now.getDate()).padStart(2,"0");
  const mm = String(now.getMonth()+1).padStart(2,"0");
  const yy = String(now.getFullYear()).slice(2);
  const filename = `sauvegarde_bd_v${APP_VERSION}_${dd}-${mm}-${yy}.json`;
  const blob = new Blob([JSON.stringify(payload)], { type:"application/json" });

  // Sur iPhone, on propose d'abord le partage natif (permet de choisir "Mail" avec le fichier
  // déjà joint) ; si ce n'est pas possible, on retombe sur le téléchargement classique.
  try{
    const file = new File([blob], filename, { type:"application/json" });
    if(navigator.canShare && navigator.canShare({ files:[file] })){
      await navigator.share({ files:[file], title:"Sauvegarde Collection BD" });
      setLastExportAt();
      return;
    }
  }catch(err){ /* l'utilisateur a peut-être juste annulé le partage : pas grave */ }

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  setLastExportAt();
}
function importBackup(file){
  const reader = new FileReader();
  reader.onload = async e=>{
    const msg = document.getElementById("backupMsg");
    try{
      const data = JSON.parse(e.target.result);
      // normalizeRow() absorbe aussi bien une sauvegarde faite avec une version plus ancienne (ou future) du code
      const incomingAdded = (Array.isArray(data.added) ? data.added : []).map(normalizeRow);
      const existingNums = new Set(userAdded.map(r=>r.num));
      incomingAdded.forEach(r=>{ if(!existingNums.has(r.num)){ userAdded.push(r); existingNums.add(r.num); } });
      saveAdded(userAdded);
      (Array.isArray(data.deleted) ? data.deleted : []).forEach(n=>deletedNums.add(n));
      saveDeleted();
      const incomingBdTrash = Array.isArray(data.bdTrash) ? data.bdTrash : [];
      const existingBdTrashNums = new Set(bdTrash.map(r=>r.num));
      incomingBdTrash.forEach(r=>{ if(!existingBdTrashNums.has(r.num)){ bdTrash.push(r); existingBdTrashNums.add(r.num); } });
      saveBdTrash();
      const incomingParabd = Array.isArray(data.parabd) ? data.parabd : [];
      const existingParaIds = new Set(parabdItems.map(p=>p.id));
      incomingParabd.forEach(p=>{ if(!existingParaIds.has(p.id)){ parabdItems.push(p); existingParaIds.add(p.id); } });
      saveParabd();
      const incomingParabdTrash = Array.isArray(data.parabdTrash) ? data.parabdTrash : [];
      const existingTrashIds = new Set(parabdTrash.map(p=>p.id));
      incomingParabdTrash.forEach(p=>{ if(!existingTrashIds.has(p.id)){ parabdTrash.push(p); existingTrashIds.add(p.id); } });
      saveParabdTrash();
      const incomingPhotos = data.photos || {};
      const changedKeys = [];
      Object.keys(incomingPhotos).forEach(key=>{
        if(!PHOTOS[key]) PHOTOS[key] = [];
        incomingPhotos[key].forEach(src=>{ if(!PHOTOS[key].includes(src)) PHOTOS[key].push(src); });
        changedKeys.push(key);
      });
      await Promise.all(changedKeys.map(k=>idbSavePhotosFor(k)));
      refreshDerived();
      if(msg) msg.textContent = "Sauvegarde importée avec succès.";
    }catch(err){
      if(msg) msg.textContent = "Ce fichier ne ressemble pas à une sauvegarde valide.";
    }
  };
  reader.readAsText(file);
}

function handleAddSubmit(e){

    return;
  }
  const cout = parseFloat(val("f_cout")); const vente = parseFloat(val("f_vente"));
  const row = {
    num: nextUserNum(), serie, titre,
    tome: val("f_tome") || "Unique",
    format: val("f_format") || "Classique",
    eo: document.getElementById("f_eo").checked,
    annee: val("f_annee") || null,
    editeur: val("f_editeur") || null,
    etat: val("f_etat") || null,
    cout: isNaN(cout) ? null : cout,
    vente: isNaN(vente) ? null : vente,
    cote: val("f_cote") || "Non coté",
    commentaire: val("f_commentaire") || "",
    owned: true
  };
  userAdded.push(row);
  saveAdded(userAdded);
  refreshDerived();
  document.getElementById("formMsg").textContent = `« ${titre} » ajouté à ta collection.`;
  document.getElementById("addForm").reset();
}

function photoProgress(){
  const allEx = OWNED.flatMap(a=>a.exemplaires.map(e=>({...e, serie:a.serie, titre:a.titre, tome:a.tome})));
  const missing = allEx.filter(e=>!(PHOTOS[e.key]||[]).length);
  return { total: allEx.length, withPhoto: allEx.length-missing.length, missing };
}
function photoProgressPara(){
  const missing = parabdItems.filter(p=>!(PHOTOS["para"+p.id]||[]).length);
  return { total: parabdItems.length, withPhoto: parabdItems.length-missing.length, missing };
}
// Ne regarde que le format "Classique" : les Intégrales/Fac-similés ont leur propre numérotation, pas censée être continue.
function detectMissingTomes(){
  const results = [];
  const seriesNames = [...new Set(OWNED.filter(a=>formatBase(a.format)==="Classique").map(a=>a.serie))];
  seriesNames.forEach(serie=>{
    const tomes = OWNED
      .filter(a=>a.serie===serie && formatBase(a.format)==="Classique")
      .map(a=>parseInt(a.tome,10)).filter(n=>!isNaN(n));
    if(tomes.length<2) return;
    const min = Math.min(...tomes), max = Math.max(...tomes);
    const have = new Set(tomes);
    const missing = [];
    for(let i=min;i<=max;i++) if(!have.has(i)) missing.push(i);
    if(missing.length) results.push({ serie, missing });
  });
  return results.sort((a,b)=>a.serie.localeCompare(b.serie,"fr"));
}

function renderStats(){
  const totalCout = OWNED.reduce((s,a)=>s+albumTotalCout(a),0);
  const totalVente = OWNED.reduce((s,a)=>s+albumTotalVente(a),0);
  const totalCote = OWNED.flatMap(a=>a.exemplaires).map(e=>parseCote(e.cote)).filter(v=>v!==null).reduce((s,v)=>s+v,0);
  const maxCount = Math.max(...SERIE_COUNTS.map(s=>s.count), 1);

  const bars = SERIE_COUNTS.slice(0,12).map(s=>`
    <div class="bar-row">
      <div class="bar-label"><span>${s.serie}</span><span class="mono">${s.count}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(s.count/maxCount*100).toFixed(0)}%"></div></div>
    </div>
  `).join("");

  const flatEx = OWNED.flatMap(a=>a.exemplaires.map(e=>({...e, titre:a.titre, coteNum:parseCote(e.cote)})));
  const rarities = flatEx.filter(e=>e.coteNum!==null).sort((a,b)=>b.coteNum-a.coteNum).slice(0,6);
  const rarityRows = rarities.map((e,i)=>`
    <div class="rarity-row">
      <span class="rarity-rank">${i+1}</span>
      <span style="flex:1; padding:0 8px;">${e.titre}</span>
      <span class="mono" style="font-weight:700; color:var(--gold);">${e.cote} €</span>
    </div>
  `).join("");

  const { total:photoTotal, withPhoto, missing } = photoProgress();
  const photoPct = photoTotal ? Math.round(withPhoto/photoTotal*100) : 0;
  const missingHtml = missing.length ? missing.map(e=>`
    <div class="rarity-row">
      <span style="flex:1;">${e.titre}${e.tome!=="Unique"?" · T"+e.tome:""} <span style="color:var(--ink-soft);">· ${e.serie}</span></span>
    </div>
  `).join("") : `<p style="font-size:13px; color:rgba(255,255,255,0.75); margin:0;">Toutes les BD ont au moins une photo !</p>`;

  const paraPhoto = photoProgressPara();
  const paraPhotoPct = paraPhoto.total ? Math.round(paraPhoto.withPhoto/paraPhoto.total*100) : 0;

  const etatCounts = ETAT_OPTIONS.map(e=>({
    etat: e,
    count: OWNED.reduce((s,a)=>s+a.exemplaires.filter(ex=>ex.etat===e).length, 0)
  }));
  const etatTotal = OWNED.reduce((s,a)=>s+a.exemplaires.length, 0);
  const etatMax = Math.max(...etatCounts.map(e=>e.count), 1);
  const etatBars = etatCounts.map(e=>`
    <div class="bar-row">
      <div class="bar-label"><span>${e.etat}</span><span class="mono">${e.count}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(e.count/etatMax*100).toFixed(0)}%; background:${etatColor(e.etat)};"></div></div>
    </div>
  `).join("");

  const serieValues = SERIE_COUNTS.map(s=>({
    serie: s.serie,
    value: OWNED.filter(a=>a.serie===s.serie).reduce((sum,a)=>sum+albumTotalVente(a),0)
  })).sort((a,b)=>b.value-a.value);
  const serieValueMax = Math.max(...serieValues.map(s=>s.value), 1);
  const serieValueBars = serieValues.slice(0,12).map(s=>`
    <div class="bar-row">
      <div class="bar-label"><span>${s.serie}</span><span class="mono">${eur(s.value)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(s.value/serieValueMax*100).toFixed(0)}%; background:var(--gold);"></div></div>
    </div>
  `).join("");

  const missingTomes = detectMissingTomes();
  const missingTomesSection = missingTomes.length ? `
    <details class="faq-item" style="margin-top:20px;">
      <summary>Tomes manquants détectés (${missingTomes.length} série${missingTomes.length>1?"s":""})</summary>
      <p>${missingTomes.map(m=>`<strong>${m.serie}</strong> : tome${m.missing.length>1?"s":""} ${m.missing.join(", ")}`).join("<br>")}</p>
    </details>
  ` : "";

  return `
    <div class="mini-stats">
      <div class="card mini-stat"><div class="val mono">${eur(totalCout)}</div><div class="lab">Coût total</div></div>
      <div class="card mini-stat"><div class="val mono">${eur(totalVente)}</div><div class="lab">Vente estim.</div></div>
      <div class="card mini-stat"><div class="val mono">${eur(totalCote)}</div><div class="lab">BDM / BD Gest</div></div>
    </div>
    <p class="section-title">Progression photo</p>
    <div class="bar-row">
      <div class="bar-label"><span>${withPhoto} / ${photoTotal} BD photographiées</span><span class="mono">${photoPct}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${photoPct}%"></div></div>
    </div>
    ${paraPhoto.total ? `
      <div class="bar-row" style="margin-top:6px;">
        <div class="bar-label"><span>${paraPhoto.withPhoto} / ${paraPhoto.total} objets Para-BD photographiés</span><span class="mono">${paraPhotoPct}%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${paraPhotoPct}%"></div></div>
      </div>
    ` : ""}
    ${missing.length ? `<p class="section-title" style="margin-top:16px;">BD sans photo (${missing.length})</p>` : ""}
    ${missingHtml}
    <p class="section-title">Répartition par état (${etatTotal})</p>
    ${etatBars}

    <div id="storageGauge" style="font-size:12.5px; color:rgba(255,255,255,0.72);">Calcul en cours…</div>
    <p class="section-title">Répartition par série</p>
    ${bars}
    <p class="section-title">Valeur par série (vente)</p>
    ${serieValueBars}
    ${missingTomesSection}
    <p class="section-title" style="margin-top:20px;">Top raretés (BDM / BD Gest)</p>
    ${rarityRows}
    ${renderCorbeilleSection()}
    <div style="text-align:center; margin-top:28px;">
      <button class="link-btn" id="openGuideBtn">Guide de l'application</button>
    </div>
  `;
}

let trashQuery = "";
function renderCorbeilleSection(){
  const totalTrashed = trashedRows().length + parabdTrash.length;
  if(!totalTrashed && !trashQuery) return "";
  return `
    <p class="section-title">Corbeille (${totalTrashed})</p>

}
function renderCorbeilleRows(){
  const q = normalizeText(trashQuery);
  const bdRows = trashedRows()
    .filter(r=>!q || normalizeText(r.titre).includes(q) || normalizeText(r.serie).includes(q))
    .sort((a,b)=>(b.deletedAt||"").localeCompare(a.deletedAt||""));

    .filter(p=>!q || normalizeText(p.objet||"").includes(q) || normalizeText(p.categorie||"").includes(q) || normalizeText(p.serie).includes(q))

    <div class="rarity-row">
      <span class="badge neutral" style="margin-right:8px;">BD</span>
      <div style="flex:1; padding-right:8px;">

    </div>
  `).join("");
  const paraHtml = paraRows.map(p=>`

      <span class="badge" style="background:var(--accent); margin-right:8px;">Para-BD</span>
      <div style="flex:1; padding-right:8px;">
        <div>${(p.objet||p.categorie)}${p.serie?" · "+p.serie:""}</div>
        <div style="font-size:11px; color:var(--ink-soft);">Supprimé le ${formatDateTime(p.deletedAt)}</div>

        <button class="link-btn trash-purge" data-purgepara="${p.id}">Vider</button>

  return (bdHtml+paraHtml) || `<div class="empty">Aucun résultat.</div>`;

function bindParaAddEvents(){
  attachCombo("pf_serie", "combo_pf_serie", ()=>distinctValues([...distinctParaSeries(), ...SERIES]));
  attachCombo("pf_categorie", "combo_pf_categorie", ()=>{

    return distinctValues(paraItemsFor(serie).map(p=>p.categorie));
  });
  attachCombo("pf_editeur", "combo_pf_editeur", distinctParaEditeurs);
  attachCombo("pf_collection", "combo_pf_collection", ()=>{

    return distinctValues(parabdItems.filter(p=>p.serie===serie && p.categorie===categorie).map(p=>p.collection));
  });
  const draftPhotoInput = document.getElementById("paraDraftPhotoInput");
  if(draftPhotoInput){
    draftPhotoInput.addEventListener("change", async e=>{
      const key = "para"+paraDraftId;
      const files = Array.from(e.target.files || []);
      if(!files.length) return;
      const compressed = await Promise.all(files.map(f=>compressImage(f).catch(()=>null)));
      if(!PHOTOS[key]) PHOTOS[key] = [];
      compressed.filter(Boolean).forEach(src=>PHOTOS[key].push(src));
      await idbSavePhotosFor(key);
      document.getElementById("paraDraftPhotoStrip").innerHTML = renderParaDraftPhotoThumbs();
      bindParaDraftPhotoDelete();
    });
  }
  bindParaDraftPhotoDelete();
  const form = document.getElementById("paraAddForm");
  if(form) form.addEventListener("submit", e=>{
    e.preventDefault();
    const val = id => document.getElementById(id).value.trim();
    const serie = val("pf_serie"), categorieTyped = val("pf_categorie");
    if(!serie || !categorieTyped){
      showAlert("Il faut au moins renseigner la série et la catégorie pour ajouter un objet.");
      return;
    }
    const finalizeAdd = (categorie, collection) => {
      const cout = parseFloat(val("pf_cout"));
      const id = paraDraftId;
      parabdItems.push({
        id, serie, categorie, collection,
        objet: val("pf_objet") || null,
        annee: val("pf_annee") || null,
        etat: val("pf_etat") || null,
        editeur: val("pf_editeur") || null,
        cout: isNaN(cout) ? null : cout,
        commentaire: val("pf_commentaire") || ""
      });
      saveParabd();
      parabdState = { level:"items", serie, categorie, collection:null, sort:"add" };
      closeDetail();
      render();
      openParaDetail(id);
    };
    const resolveCollectionAndFinalize = categorie => {
      const collectionTyped = val("pf_collection");
      if(!collectionTyped){ finalizeAdd(categorie, null); return; }
      const foundCol = findSimilarCollection(serie, categorie, collectionTyped);
      if(foundCol && foundCol.exact){
        finalizeAdd(categorie, foundCol.match);
      } else if(foundCol && !foundCol.exact){
        showChoice(
          `Une collection proche, « ${foundCol.match} », existe déjà pour ${serie} / ${categorie}. Veux-tu y placer cet objet ?`,
          "Oui", "Non, nouvelle collection",
          ()=>finalizeAdd(categorie, foundCol.match),
          ()=>finalizeAdd(categorie, collectionTyped)
        );
      } else {
        finalizeAdd(categorie, collectionTyped);
      }
    };
    const found = findSimilarCategory(serie, categorieTyped);
    if(found && found.exact){
      resolveCollectionAndFinalize(found.match); // accents/majuscules seulement : rattachement silencieux
    } else if(found && !found.exact){
      showChoice(
        `Une catégorie proche, « ${found.match} », existe déjà pour ${serie}. Veux-tu y placer cet objet ?`,
        "Oui", "Non, nouvelle catégorie",
        ()=>resolveCollectionAndFinalize(found.match),
        ()=>resolveCollectionAndFinalize(categorieTyped)
      );
    } else {
      resolveCollectionAndFinalize(categorieTyped);
    }
  });
}

    <div class="sheet-title">Gérer la vitrine</div>
    <p style="font-size:13px; color:var(--ink-soft); margin:0 0 16px;">Choisis les albums mis en avant sur l'étagère. Pour un album en double ou triple, sélectionne l'exemplaire à afficher.</p>
    ${current}
    <p class="section-title" style="margin-top:22px;">Ajouter un album</p>
    <input class="search-input" id="vitrineSearch" placeholder="Chercher un titre…" value="${vitrineQuery}">
    <div id="vitrineResults">${resultsHtml}</div>
  `;
}
function renderGuide(){
  const faq = [
    {
      q: "Fonctionnement d'ensemble de l'application",
      a: `Cette application te permet de cataloguer ta collection de bandes dessinées et tes objets dérivés (fèves, figurines…), avec photos, valeurs et suivi personnalisé. Elle fonctionne entièrement hors-ligne une fois installée sur l'écran d'accueil de ton iPhone : toutes tes données (BD ajoutées, photos, suppressions) sont stockées uniquement sur ton téléphone, jamais envoyées ailleurs. Cinq onglets composent l'application : Étagère, Collection, Ajouter, Para-BD et Statistiques.`
    },
    {
      q: "L'onglet Étagère",
      a: `Deux façons de visualiser ta collection : par tranches (les séries représentées comme des dos de livres, largeur proportionnelle au nombre d'albums) ou par couvertures (regroupées par série, triées par ordre de tome). L'interrupteur en haut bascule de l'une à l'autre ; revenir sur cet onglet remet toujours la vue par tranches par défaut. En dessous, la section "En vitrine" met en avant 3 albums de ton choix — appuie sur "Gérer" pour changer lesquels, et pour choisir quel exemplaire précis afficher si l'un d'eux est en double.`
    },
    {
      q: "L'onglet Collection",
      a: `Recherche par titre, série ou éditeur — insensible aux majuscules et aux accents (tape "asterix" retrouve bien "Astérix"). Deux menus déroulants permettent de filtrer par format et de trier (numéro, alphabétique, valeur, côte, tome, ordre de parution, EO d'abord). Les chips en haut filtrent par série. Quand un album existe en plusieurs exemplaires (état différent, par exemple), une seule ligne apparaît avec la mention "en double" ou "en triple" — les détails de chaque exemplaire sont accessibles dans sa fiche. "Non renseigné" indique simplement qu'un champ n'a pas été rempli.`
    },
    {
      q: "L'onglet Ajouter",
      a: `Seuls Série et Titre sont obligatoires pour ajouter une BD ; tout le reste peut être laissé vide. Les champs Série, Titre, Format et Éditeur proposent des suggestions basées sur ce que tu as déjà saisi, insensibles aux accents et majuscules. Si la BD que tu ajoutes correspond exactement (série, titre, tome, format) à une déjà présente, elle est automatiquement ajoutée comme exemplaire supplémentaire plutôt que dupliquée.`
    },
    {
      q: "L'onglet Para-BD",
      a: `Structure à trois niveaux : Série → Catégorie (ex. "Fèves") → Objet (ex. "Bonnemine"). Seuls Série et Catégorie sont obligatoires. Quand tu tapes une catégorie proche d'une déjà existante (accents, majuscules, ou légère faute de frappe), l'application te propose de la rattacher plutôt que d'en créer une nouvelle. Une barre de recherche en haut permet de retrouver un objet directement, tous niveaux confondus.`
    },
    {
      q: "L'onglet Statistiques",
      a: `Coût total, valeur de vente estimée et côte BDM/BD Gest de ta collection. Progression de tes photos (combien de BD en ont une, et lesquelles n'en ont pas encore). Répartition par état et par série. Top raretés selon la côte. La Corbeille conserve tout ce que tu supprimes (BD comme Para-BD) : "Restaurer" le remet en place, "Vider" l'efface définitivement et sans retour possible.`
    },
    {
      q: "Technicités de l'application",
      a: `<strong>Où sont stockées tes données</strong><br>
          Tout ce que tu ajoutes (BD, objets Para-BD, photos, suppressions) est stocké directement sur ton iPhone, dans l'espace réservé à Safari pour cette application — jamais sur un serveur, jamais dans un cloud. Le texte (fiches) et les photos (plus volumineuses) utilisent deux espaces de stockage distincts, les photos ayant beaucoup plus de place disponible.<br><br>

          <strong>Ce qui se passe lors d'une mise à jour de l'application</strong><br>
          Quand je modifie le code et que tu remplaces le fichier index.html sur GitHub, l'adresse de ton application (https://tonpseudo.github.io/…) ne change pas. Tes données sont rattachées à cette adresse, pas au contenu du fichier — donc à chaque nouvelle version, ton téléphone retrouve automatiquement tout ce que tu avais déjà ajouté, sans aucune manipulation. À chaque changement dans la structure des données (comme l'ajout de la Catégorie dans Para-BD), j'écris aussi du code qui "traduit" tes anciennes données vers le nouveau format.<br><br>

          <strong>Comment exporter une sauvegarde, étape par étape</strong><br>
          1. Onglet Ajouter → section "Sauvegarde locale" → bouton "Exporter (.json)"<br>
          2. Le menu de partage natif de l'iPhone s'ouvre : choisis où envoyer le fichier — Mail (te l'envoyer par e-mail), Enregistrer dans Fichiers (le garder sur le téléphone ou iCloud Drive), AirDrop (vers un autre appareil), etc.<br>
          3. Le fichier s'appelle <em>sauvegarde_bd_vX.Y.Z_JJ-MM-AA.json</em> — le numéro de version de l'appli et la date du jour de l'export.<br><br>

          <strong>Comment importer une sauvegarde, étape par étape</strong><br>
          1. Assure-toi que le fichier .json est accessible sur le téléphone où tu veux l'importer (transfère-le au préalable si besoin : AirDrop, e-mail, iCloud Drive…)<br>
          2. Onglet Ajouter → section "Sauvegarde locale" → bouton "Importer"<br>
          3. Choisis le fichier depuis l'app Fichiers<br>
          4. Tes BD ajoutées, tes objets Para-BD et tes photos réapparaissent, fusionnés avec ce qui existe déjà sur cet appareil.<br><br>

          <strong>Dans quels cas utiliser l'export/import, concrètement</strong><br>
          • <u>Tu changes de téléphone</u> : sur l'ancien, exporte une sauvegarde. Sur le nouveau, réinstalle l'application (même lien GitHub, même procédure "Sur l'écran d'accueil"), puis importe le fichier — tu retrouves tout.<br>
          • <u>Sauvegarde de sécurité "au cas où"</u> : exporte de temps en temps (le rappel dans l'appli t'y aide), garde le fichier en lieu sûr.<br>
          • <u>Données de Safari vidées par erreur, ou icône supprimée puis réinstallée</u> : importe ta dernière sauvegarde pour tout récupérer.<br>
          • <u>Ce qu'il ne faut PAS faire</u> : réimporter une sauvegarde après une mise à jour du code — inutile, c'est déjà automatique. Et attention : une sauvegarde ancienne ne peut jamais annuler une suppression faite depuis (l'import ajoute, il ne supprime jamais) — pour récupérer une BD supprimée par erreur, va dans la Corbeille (onglet Stats), pas dans une vieille sauvegarde.<br><br>

          <strong>Ce que contient (et ne contient pas) une sauvegarde</strong><br>
          Contenu : tes BD ajoutées, tes objets Para-BD (et leurs corbeilles respectives), toutes tes photos. Non inclus : les 150 BD de la collection de base, écrites directement dans le code de l'application — donc toujours présentes automatiquement, sur n'importe quel appareil, sans avoir besoin d'être sauvegardées.<br><br>

          <strong>Espace de stockage disponible</strong><br>
          Les photos sont compressées automatiquement avant d'être enregistrées, pour en tenir beaucoup plus dans le même espace. L'onglet Statistiques affiche une jauge en temps réel de l'espace utilisé et restant sur ton téléphone, avec une estimation du nombre de photos qu'il te reste avant d'atteindre la limite réelle de ton appareil.<br><br>

          <strong>Limites à connaître</strong><br>
          • Pas de vraie notification système : le rappel de sauvegarde n'apparaît qu'en ouvrant l'application (une page web sans serveur ne peut pas envoyer d'alerte sur un écran verrouillé).<br>
          • Pas de synchronisation entre appareils : ouvrir l'application sur un autre téléphone ou un ordinateur démarre "vide" (juste la base de 150 BD) tant que tu n'as pas importé une sauvegarde.<br>
          • Une photo ajoutée dans l'application est une copie indépendante de celle de ta pellicule : la supprimer d'un côté ne l'efface pas de l'autre.<br>
          • Si Safari vide un jour les données d'un site inutilisé depuis très longtemps (rare pour une appli sur écran d'accueil, mais possible), tout ce qui n'a pas été exporté serait perdu.<br>
          • <strong>⚠️ Supprimer puis recréer l'icône sur l'écran d'accueil peut effacer toutes tes données locales (photos, BD ajoutées, corbeille)</strong>, même si l'adresse du site ne change pas — c'est un comportement d'iOS, pas un bug de l'application, mais il est réel (c'est arrivé une fois). En pratique, tu n'as jamais besoin de recréer l'icône pour une simple mise à jour du contenu — seul un changement de design de l'icône elle-même le demande. Si ce cas se présente un jour, exporte toujours une sauvegarde juste avant.`
    }
  ];
  const items = faq.map(item=>`
    <details class="faq-item">
      <summary>${item.q}</summary>
      <p>${item.a}</p>
    </details>
  `).join("");
  return `
    <button class="close-x" id="closeSheet">&times;</button>
    <div class="sheet-handle"></div>
    <div class="sheet-eyebrow">Aide</div>
    <div class="sheet-title">Guide de l'application</div>
    ${items}
    <p class="guide-credit">Cette application a été conçue par Antoine BILLARD, avec l'aide de Claude (Anthropic).<br>Version ${APP_VERSION} — ${APP_VERSION_DATE}</p>
  `;
}
function openGuide(){
  document.getElementById("sheet").innerHTML = renderGuide();
  document.getElementById("sheet").classList.add("open");
  document.getElementById("backdrop").classList.add("open");
}
function openVitrineManager(){
  vitrineQuery = "";
  document.getElementById("sheet").innerHTML = renderVitrineManager();
  document.getElementById("sheet").classList.add("open");
  document.getElementById("backdrop").classList.add("open");
  bindVitrineManagerEvents();
}
function bindVitrineManagerEvents(){
  document.querySelectorAll("[data-removevitrine]").forEach(el=>{
    el.addEventListener("click", ()=>{
      VITRINE.splice(Number(el.dataset.removevitrine), 1);
      saveVitrine();
      refreshVitrineManagerAndShelf();
    });
  });
  document.querySelectorAll("[data-vitex]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const [i, ei] = el.dataset.vitex.split(":").map(Number);
      VITRINE[i].exIndex = ei;
      saveVitrine();
      refreshVitrineManagerAndShelf();
    });
  });
  document.querySelectorAll("[data-addvitrine]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const titre = el.dataset.addvitrine;
      if(!VITRINE.some(v=>v.titre===titre)) VITRINE.push({ titre, exIndex:0 });
      saveVitrine();
      vitrineQuery = "";
      refreshVitrineManagerAndShelf();
    });
  });
  const searchBox = document.getElementById("vitrineSearch");
  if(searchBox){
    searchBox.addEventListener("input", e=>{
      vitrineQuery = e.target.value;
      const caret = searchBox.selectionStart;
      document.getElementById("sheet").innerHTML = renderVitrineManager();
      bindVitrineManagerEvents();
      const nb = document.getElementById("vitrineSearch");
      if(nb){ nb.focus(); nb.setSelectionRange(caret, caret); }
    });
  }
}
function refreshVitrineManagerAndShelf(){
  document.getElementById("sheet").innerHTML = renderVitrineManager();
  bindVitrineManagerEvents();
  if(state.tab==="shelf") render();
}

/* ================================================================
   NAVIGATION ENTRE ONGLETS & LIAISON DES ÉVÉNEMENTS
   ================================================================ */
const HEADERS = {
  shelf: ()=>["Collection de Bandes dessinées", OWNED.reduce((s,a)=>s+a.exemplaires.length,0)+" albums · "+SERIES.length+" séries"],
  collection: ()=>["Collection", "Recherche et filtres"],
  ajouter: ()=>["Ajouter une BD", "Elle sera classée automatiquement"],
  parabd: ()=>["Para-BD", parabdItems.length+" objet"+(parabdItems.length>1?"s":"")],
  stats: ()=>["Statistiques", "Version "+APP_VERSION]
};

function render(){
  refreshDerived();
  const [title, sub] = HEADERS[state.tab]();
  document.getElementById("headerTitle").textContent = title;
  document.getElementById("headerSub").textContent = sub;
  document.getElementById("topbar").classList.toggle("centered", state.tab==="shelf");
  const main = document.getElementById("main");
  if(state.tab==="shelf") main.innerHTML = renderShelf();
  else if(state.tab==="collection") main.innerHTML = renderCollection();
  else if(state.tab==="ajouter") main.innerHTML = renderAjouter();
  else if(state.tab==="parabd") main.innerHTML = renderParabd();
  else if(state.tab==="stats"){ main.innerHTML = renderStats(); updateStorageGauge(); }

  document.querySelectorAll(".tabbar button").forEach(b=>b.classList.toggle("active", b.dataset.tab===state.tab));

  document.querySelectorAll("[data-detail]").forEach(el=>{
    el.addEventListener("click", ()=>openDetail(el.dataset.detail, el.dataset.exidx));
  });
  document.querySelectorAll(".spine").forEach(el=>{
    el.addEventListener("click", ()=>{ state.tab="collection"; state.filterSerie = el.dataset.serie; state.query=""; render(); });
  });
  const manageVitrineBtn = document.getElementById("manageVitrineBtn");
  if(manageVitrineBtn) manageVitrineBtn.addEventListener("click", openVitrineManager);
  const openGuideBtn = document.getElementById("openGuideBtn");
  if(openGuideBtn) openGuideBtn.addEventListener("click", openGuide);
  const reminderExportBtn = document.getElementById("reminderExportBtn");
  if(reminderExportBtn) reminderExportBtn.addEventListener("click", exportBackup);
  const reminderDismissBtn = document.getElementById("reminderDismissBtn");
  if(reminderDismissBtn) reminderDismissBtn.addEventListener("click", ()=>{ dismissReminder(); render(); });
  const coverToggle = document.getElementById("coverToggle");
  if(coverToggle) coverToggle.addEventListener("change", e=>{ state.shelfCovers = e.target.checked; render(); });
  document.querySelectorAll(".chip").forEach(el=>{
    el.addEventListener("click", ()=>{ state.filterSerie = el.dataset.chip || null; state.filterFormat = null; render(); });
  });
  const searchBox = document.getElementById("searchBox");
  if(searchBox) searchBox.addEventListener("input", e=>{ state.query = e.target.value; renderPartialCollection(); });
  bindClearSearch();
  const sortSelect = document.getElementById("sortSelect");
  if(sortSelect) sortSelect.addEventListener("change", e=>{ state.sort = e.target.value; render(); });
  const formatFilterSelect = document.getElementById("formatFilterSelect");
  if(formatFilterSelect) formatFilterSelect.addEventListener("change", e=>{ state.filterFormat = e.target.value || null; render(); });
  const etatFilterSelect = document.getElementById("etatFilterSelect");
  if(etatFilterSelect) etatFilterSelect.addEventListener("change", e=>{ state.filterEtat = e.target.value || null; render(); });
  const addForm = document.getElementById("addForm");
  if(addForm){
    addForm.addEventListener("submit", handleAddSubmit);
    attachCombo("f_serie", "combo_serie", distinctSeries);
    attachCombo("f_titre", "combo_titre", distinctTitres);
    attachCombo("f_format", "combo_format", distinctFormats);
    attachCombo("f_editeur", "combo_editeur", distinctEditeurs);
  }
  const exportBtn = document.getElementById("exportBtn");
  if(exportBtn) exportBtn.addEventListener("click", exportBackup);
  const importInput = document.getElementById("importInput");
  if(importInput) importInput.addEventListener("change", e=>{ if(e.target.files[0]) importBackup(e.target.files[0]); });
  const insuranceBtn = document.getElementById("insuranceBtn");
  if(insuranceBtn) insuranceBtn.addEventListener("click", openInsuranceDoc);

  document.querySelectorAll("[data-paraserie]").forEach(el=>{
    el.addEventListener("click", ()=>{ parabdState = { level:"categories", serie:el.dataset.paraserie, categorie:null, collection:null, sort:"add" }; render(); });
  });
  document.querySelectorAll("[data-paracategorie]").forEach(el=>{
    el.addEventListener("click", ()=>{ parabdState.level="items"; parabdState.categorie=el.dataset.paracategorie; parabdState.collection=null; parabdState.sort="add"; render(); });
  });
  document.querySelectorAll("[data-paracollection]").forEach(el=>{
    el.addEventListener("click", ()=>{ parabdState.level="collectionItems"; parabdState.collection=el.dataset.paracollection; parabdState.sort="add"; render(); });
  });
  document.querySelectorAll("[data-paraitem]").forEach(el=>{
    el.addEventListener("click", ()=>openParaDetail(el.dataset.paraitem));
  });
  const paraBackToSeries = document.getElementById("paraBackToSeries");
  if(paraBackToSeries) paraBackToSeries.addEventListener("click", ()=>{ parabdState = { level:"series", serie:null, categorie:null, collection:null, sort:"add" }; render(); });
  const paraBackToCategories = document.getElementById("paraBackToCategories");
  if(paraBackToCategories) paraBackToCategories.addEventListener("click", ()=>{ parabdState.level="categories"; parabdState.categorie=null; parabdState.collection=null; render(); });
  const paraBackToItems = document.getElementById("paraBackToItems");
  if(paraBackToItems) paraBackToItems.addEventListener("click", ()=>{ parabdState.level="items"; parabdState.collection=null; render(); });
  const paraSortSelect = document.getElementById("paraSortSelect");
  if(paraSortSelect) paraSortSelect.addEventListener("change", e=>{ parabdState.sort = e.target.value; render(); });
  const paraAddBtn = document.getElementById("paraAddBtn");
  if(paraAddBtn) paraAddBtn.addEventListener("click", openParaAdd);
  bindParabdSearch();
  bindTrashSearch();
}
function bindParabdSearch(){
  const searchBox = document.getElementById("parabdSearch");
  if(searchBox){
    searchBox.addEventListener("input", e=>{
      parabdQuery = e.target.value;
      const caret = searchBox.selectionStart;
      const main = document.getElementById("main");
      main.innerHTML = renderParabd();
      document.querySelectorAll("[data-paraitem]").forEach(el=>{
        el.addEventListener("click", ()=>openParaDetail(el.dataset.paraitem));
      });
      bindParabdSearch();
      const paraAddBtn2 = document.getElementById("paraAddBtn");
      if(paraAddBtn2) paraAddBtn2.addEventListener("click", openParaAdd);
      const nb = document.getElementById("parabdSearch");
      if(nb){ nb.focus(); nb.setSelectionRange(caret, caret); }
    });
  }
  const clearBtn = document.getElementById("clearParabdSearch");
  if(clearBtn) clearBtn.addEventListener("click", ()=>{ parabdQuery=""; render(); });
}
function bindTrashSearch(){
  document.querySelectorAll("[data-restore]").forEach(el=>{
    el.addEventListener("click", ()=>{ restoreDeleted(Number(el.dataset.restore)); render(); });
  });
  document.querySelectorAll("[data-restorepara]").forEach(el=>{
    el.addEventListener("click", ()=>{ restoreParaItem(Number(el.dataset.restorepara)); render(); });
  });
  document.querySelectorAll("[data-purge]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const num = Number(el.dataset.purge);
      showConfirm("Supprimer définitivement cet élément de la corbeille ? Impossible de revenir en arrière ensuite.", "Vider", async ()=>{
        await purgeBdTrash(num);
        render();
      });
    });
  });
  document.querySelectorAll("[data-purgepara]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = Number(el.dataset.purgepara);
      showConfirm("Supprimer définitivement cet élément de la corbeille ? Impossible de revenir en arrière ensuite.", "Vider", async ()=>{
        await purgeParaItem(id);
        render();
      });
    });
  });
  const trashSearch = document.getElementById("trashSearch");
  if(trashSearch){
    trashSearch.addEventListener("input", e=>{
      trashQuery = e.target.value;
      const caret = trashSearch.selectionStart;
      document.getElementById("trashResults").innerHTML = renderCorbeilleRows();
      bindTrashSearch();
      const nb = document.getElementById("trashSearch");
      if(nb){ nb.focus(); nb.setSelectionRange(caret, caret); }
    });
  }
}
function bindClearSearch(){
  const btn = document.getElementById("clearSearch");
  if(btn) btn.addEventListener("click", ()=>{ state.query=""; renderPartialCollection(); });
}

// re-rendu léger pendant la frappe dans la recherche (garde le focus du clavier)
function renderPartialCollection(){
  const appEl = document.getElementById("app");
  const scrollY = appEl.scrollTop;
  const main = document.getElementById("main");
  const box = document.getElementById("searchBox");
  const caret = box ? box.selectionStart : null;
  main.innerHTML = renderCollection();
  document.querySelectorAll("[data-detail]").forEach(el=> el.addEventListener("click", ()=>openDetail(el.dataset.detail, el.dataset.exidx)));
  document.querySelectorAll(".chip").forEach(el=> el.addEventListener("click", ()=>{ state.filterSerie = el.dataset.chip || null; state.filterFormat = null; render(); }));
  const sortSelect = document.getElementById("sortSelect");
  if(sortSelect) sortSelect.addEventListener("change", e=>{ state.sort = e.target.value; render(); });
  const formatFilterSelect = document.getElementById("formatFilterSelect");
  if(formatFilterSelect) formatFilterSelect.addEventListener("change", e=>{ state.filterFormat = e.target.value || null; render(); });
  const etatFilterSelect = document.getElementById("etatFilterSelect");
  if(etatFilterSelect) etatFilterSelect.addEventListener("change", e=>{ state.filterEtat = e.target.value || null; render(); });
  bindClearSearch();
  const newBox = document.getElementById("searchBox");
  if(newBox){
    newBox.focus();
    if(caret!==null) newBox.setSelectionRange(caret, caret);
    newBox.addEventListener("input", e=>{ state.query = e.target.value; renderPartialCollection(); });
  }
  appEl.scrollTop = scrollY;
}

document.querySelectorAll("nav.tabbar button").forEach(b=>{
  b.addEventListener("click", ()=>{
    state.tab = b.dataset.tab;
    if(state.tab==="shelf"){ state.shelfCovers = false; }
    if(state.tab==="parabd"){ parabdState = { level:"series", serie:null, categorie:null, collection:null, sort:"add" }; parabdQuery=""; }
    render();
    const appEl = document.getElementById("app");
    if(appEl) appEl.scrollTop = 0;
  });
});
document.getElementById("backdrop").addEventListener("click", closeDetail);
document.addEventListener("click", e=>{ if(e.target && e.target.id==="closeSheet") closeDetail(); });

render();
idbLoadAllPhotos().then(p=>{ PHOTOS = p; render(); if(document.getElementById("sheet").classList.contains("open")) document.getElementById("sheet").innerHTML = renderSheet(); });
</script>
